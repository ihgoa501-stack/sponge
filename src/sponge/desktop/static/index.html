<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sponge — Agent Harness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN.md tokens ── */
:root {
  --canvas:       #2b2622;
  --canvas-soft:  #383330;
  --hairline:     #3f3a36;
  --primary:      #2dd4bf;
  --primary-deep: #14b8a6;
  --on-primary:   #1a1a1a;
  --ink:          #f7f5f0;
  --body:         #c9c0ad;
  --body-strong:  #dad2c1;
  --mute:         #aea69c;
  --success:      #22c55e;
  --warning:      #f59e0b;
  --error:        #ef4444;
  --info:         #60a5fa;
  --font-sans:    'Inter', system-ui, -apple-system, sans-serif;
  --font-mono:    'DM Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  --radius-sm:    4px;
  --radius-md:    6px;
  --radius-lg:    8px;
  --radius-pill:  9999px;
  --space-xs:     4px;
  --space-sm:     8px;
  --space-md:     12px;
  --space-lg:     16px;
  --space-xl:     24px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: var(--canvas);
  color: var(--body);
  height: 100vh;
  display: flex;
  font-size: 14px;
  line-height: 1.5;
}

/* ── Chat panel ── */
#chat-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-xl);
  scroll-behavior: smooth;
}

/* ── Messages ── */
.msg {
  margin-bottom: var(--space-xl);
  max-width: 720px;
}
.msg .role {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: var(--space-xs);
}
.msg.user .role  { color: var(--mute); }
.msg.assistant .role { color: var(--primary); }
.msg.system .role { color: var(--warning); }
.msg .text {
  font-size: 14px;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--ink);
}
.msg.user .text { color: var(--body); }
.msg .img-preview {
  max-width: 240px;
  max-height: 160px;
  border-radius: var(--radius-sm);
  margin-top: var(--space-sm);
  border: 1px solid var(--hairline);
}

/* ── Input area ── */
#input-area {
  padding: var(--space-lg) var(--space-xl);
  border-top: 1px solid var(--hairline);
  display: flex;
  gap: var(--space-sm);
  align-items: center;
  background: var(--canvas);
}
#input-area input[type="text"] {
  flex: 1;
  padding: 10px var(--space-md);
  border: 1px solid var(--hairline);
  border-radius: var(--radius-sm);
  background: var(--canvas-soft);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s;
}
#input-area input[type="text"]:focus {
  border-color: var(--primary);
}
#input-area input[type="text"]::placeholder {
  color: var(--mute);
}
#attach-btn {
  padding: 10px 12px;
  background: var(--canvas-soft);
  color: var(--body-strong);
  border: 1px solid var(--hairline);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 16px;
  font-family: var(--font-sans);
  transition: border-color 0.15s;
}
#attach-btn:hover { border-color: var(--primary); }
#send-btn {
  padding: 10px 20px;
  background: var(--primary);
  color: var(--on-primary);
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 500;
  transition: background 0.15s;
}
#send-btn:hover { background: var(--primary-deep); }
#send-btn:disabled { opacity: 0.4; cursor: default; }

#image-preview {
  display: flex;
  gap: var(--space-xs);
  flex-wrap: wrap;
  padding: var(--space-xs) var(--space-xl);
}
#image-preview img {
  height: 44px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--hairline);
}

/* ── Cost panel ── */
#cost-panel {
  width: 264px;
  background: var(--canvas-soft);
  padding: var(--space-xl);
  display: flex;
  flex-direction: column;
  gap: var(--space-md);
  border-left: 1px solid var(--hairline);
  font-family: var(--font-sans);
  font-size: 13px;
  overflow-y: auto;
}
#cost-panel h3 {
  color: var(--mute);
  font-size: 11px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  font-weight: 400;
  padding-top: var(--space-sm);
}
#cost-panel h3:first-child { padding-top: 0; }
.cost-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 13px;
  color: var(--body);
  padding: 2px 0;
}
.cost-val {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--primary);
}
.cost-naive-val {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--mute);
}
.cost-savings {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--success);
}
.cost-divider {
  border: none;
  border-top: 1px solid var(--hairline);
  margin: var(--space-xs) 0;
}
.cache-badge {
  display: inline-block;
  padding: 1px 8px;
  border-radius: var(--radius-pill);
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.cache-hit  { background: rgba(34,197,94,0.15); color: var(--success); }
.cache-miss { background: rgba(245,158,11,0.12); color: var(--warning); }
.plugin-hit { background: rgba(96,165,250,0.12); color: var(--info); }
.savings-pct {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 400;
  color: var(--primary);
  text-align: center;
  padding: var(--space-sm) 0;
}

/* ── Loading indicator ── */
.loading {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--primary);
  border-radius: 50%;
  animation: pulse 0.7s infinite alternate;
}
@keyframes pulse { to { opacity: 0.2; transform: scale(0.85); } }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--mute); }

/* ── Responsive ── */
@media (max-width: 700px) {
  body { flex-direction: column; }
  #cost-panel {
    width: 100%;
    flex-direction: row;
    flex-wrap: wrap;
    gap: var(--space-sm);
    padding: var(--space-md);
    border-left: none;
    border-top: 1px solid var(--hairline);
    font-size: 12px;
    max-height: 140px;
  }
  #cost-panel h3 { width: 100%; }
  #cost-panel .cost-row { width: auto; gap: var(--space-md); }
  #messages { padding: var(--space-md); }
  #input-area { padding: var(--space-md); }
}
</style>
</head>
<body>

<div id="chat-panel">
  <div id="messages"></div>
  <div id="image-preview"></div>
  <div id="input-area">
    <input type="file" id="file-input" accept="image/*" style="display:none" multiple>
    <button id="attach-btn" onclick="document.getElementById('file-input').click()" title="Attach image">+</button>
    <input type="text" id="msg-input" placeholder="Describe your task…" autofocus>
    <button id="send-btn" onclick="send()">Send</button>
  </div>
</div>

<div id="cost-panel">
  <h3>Cost</h3>
  <div class="cost-row"><span>Actual</span><span class="cost-val" id="cost-actual">$0.0000</span></div>
  <div class="cost-row"><span>Naive</span><span class="cost-naive-val" id="cost-naive">$0.0000</span></div>
  <div class="cost-row"><span>Saved</span><span class="cost-savings" id="cost-saved">$0.0000</span></div>
  <hr class="cost-divider">
  <div class="savings-pct" id="savings-pct">—</div>
  <hr class="cost-divider">
  <h3>Breakdown</h3>
  <div class="cost-row"><span>LLM calls</span><span class="cost-naive-val" id="calls-llm">0</span></div>
  <div class="cost-row"><span>Cache</span><span id="calls-cache"></span></div>
  <div class="cost-row"><span>Plugin</span><span class="cost-naive-val" id="calls-plugin">0</span></div>
</div>

<script>
let callCount = 0, cacheHits = 0, pluginCalls = 0;
let totalCost = 0, totalNaive = 0;
let attachedImages = [];

document.getElementById('file-input').addEventListener('change', async () => {
  const files = document.getElementById('file-input').files;
  for (const f of files) {
    const b64 = await fileToBase64(f);
    attachedImages.push(b64);
    const img = document.createElement('img');
    img.src = b64; img.title = f.name;
    document.getElementById('image-preview').appendChild(img);
  }
});

function fileToBase64(file) {
  return new Promise((resolve) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.readAsDataURL(file);
  });
}

document.getElementById('msg-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') send();
});

async function send() {
  const input = document.getElementById('msg-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  input.disabled = true;
  document.getElementById('send-btn').disabled = true;

  const images = [...attachedImages];
  attachedImages = [];
  document.getElementById('image-preview').innerHTML = '';

  let userHtml = escapeHtml(msg);
  for (const img of images) {
    userHtml += '<br><img class="img-preview" src="' + img + '">';
  }
  addMessage('user', userHtml);
  const aiDiv = addMessage('assistant', '<span class="loading"></span>');

  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg, images: images}),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    let text = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});

      for (const line of buf.split('\n')) {
        if (line.startsWith('event: ')) {
          buf = line + '\n';
          continue;
        }
        if (line.startsWith('data: ')) {
          const eventType = buf.match(/event: (\w+)/)?.[1];
          const data = JSON.parse(line.slice(6));
          buf = '';

          if (eventType === 'response') {
            text = data.text;
            aiDiv.querySelector('.text').innerHTML = escapeHtml(text);
          } else if (eventType === 'cost') {
            callCount++;
            totalCost += data.cost;
            totalNaive += data.naive_cost;
            if (data.cache_hit) cacheHits++;
            if (data.cost === 0 && !data.cache_hit) pluginCalls++;
            updateCostPanel(data);
          } else if (eventType === 'error') {
            aiDiv.querySelector('.text').innerHTML = '<span style="color:var(--error)">Error: ' + escapeHtml(data.message) + '</span>';
          }
        }
      }
    }
  } catch (e) {
    aiDiv.querySelector('.text').innerHTML = '<span style="color:var(--error)">Connection error</span>';
  }

  input.disabled = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = '<div class="role">' + (role === 'user' ? 'YOU' : (role === 'system' ? '·' : 'SPONGE')) + '</div><div class="text">' + text + '</div>';
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  return div;
}

function updateCostPanel(data) {
  document.getElementById('cost-actual').textContent = '$' + totalCost.toFixed(4);
  document.getElementById('cost-naive').textContent = '$' + totalNaive.toFixed(4);
  const saved = totalNaive - totalCost;
  document.getElementById('cost-saved').textContent = '$' + saved.toFixed(4);
  const pct = totalNaive > 0 ? (saved / totalNaive * 100) : 0;
  const pctEl = document.getElementById('savings-pct');
  pctEl.textContent = pct >= 90 ? pct.toFixed(0) + '% saved' : (pct > 0 ? pct.toFixed(1) + '%' : '—');
  document.getElementById('calls-llm').textContent = callCount - cacheHits - pluginCalls;
  const cacheEl = document.getElementById('calls-cache');
  if (cacheHits > 0) {
    cacheEl.innerHTML = '<span class="cache-badge cache-hit">' + cacheHits + ' hits</span>';
  } else {
    cacheEl.innerHTML = '<span class="cache-badge cache-miss">0</span>';
  }
  const pluginVal = document.getElementById('calls-plugin');
  if (pluginCalls > 0) {
    pluginVal.innerHTML = '<span class="cache-badge plugin-hit">' + pluginCalls + '</span>';
  } else {
    pluginVal.textContent = '0';
  }
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
