<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sponge Desktop</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; }
#chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#messages { flex: 1; overflow-y: auto; padding: 20px; }
#cost-panel { width: 260px; background: #16213e; padding: 20px; display: flex; flex-direction: column; gap: 16px; border-left: 1px solid #0f3460; }
#cost-panel h3 { color: #e94560; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
.cost-row { display: flex; justify-content: space-between; font-size: 14px; }
.cost-val { font-weight: bold; color: #53d769; }
#input-area { padding: 16px 20px; border-top: 1px solid #0f3460; display: flex; gap: 10px; }
#input-area input { flex: 1; padding: 12px 16px; border: 1px solid #0f3460; border-radius: 8px; background: #16213e; color: #e0e0e0; font-size: 14px; outline: none; }
#input-area input:focus { border-color: #e94560; }
#input-area button { padding: 12px 24px; background: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
#input-area button:hover { background: #c73652; }
#input-area button:disabled { opacity: 0.5; cursor: default; }
.msg { margin-bottom: 16px; line-height: 1.6; }
.msg.user { color: #a0a0c0; }
.msg.assistant { color: #e0e0e0; }
.msg .role { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.msg.user .role { color: #e94560; }
.msg.assistant .role { color: #53d769; }
.msg .text { font-size: 14px; white-space: pre-wrap; word-break: break-word; }
.loading { display: inline-block; width: 8px; height: 8px; background: #e94560; border-radius: 50%; animation: pulse 0.6s infinite alternate; }
@keyframes pulse { to { opacity: 0.3; } }
</style>
</head>
<body>

<div id="chat-panel">
  <div id="messages"></div>
  <div id="input-area">
    <input type="text" id="msg-input" placeholder="Type your task..." autofocus>
    <button id="send-btn" onclick="send()">Send</button>
  </div>
</div>

<div id="cost-panel">
  <h3>Session Cost</h3>
  <div class="cost-row"><span>Actual</span><span class="cost-val" id="cost-actual">$0.0000</span></div>
  <div class="cost-row"><span>Naive</span><span id="cost-naive">$0.0000</span></div>
  <div class="cost-row"><span>Saved</span><span class="cost-val" id="cost-saved">$0.0000</span></div>
  <div class="cost-row"><span>Rate</span><span class="cost-val" id="cost-pct">0%</span></div>
  <h3 style="margin-top:12px">Calls</h3>
  <div class="cost-row"><span>LLM</span><span id="calls-llm">0</span></div>
  <div class="cost-row"><span>Cache hits</span><span id="calls-cache">0</span></div>
  <div class="cost-row"><span>Plugin</span><span id="calls-plugin">0</span></div>
</div>

<script>
let callCount = 0, cacheHits = 0, pluginCalls = 0;
let totalCost = 0, totalNaive = 0;

document.getElementById('msg-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') send();
});

async function send() {
  const input = document.getElementById('msg-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  input.disabled = true;
  document.getElementById('send-btn').disabled = true;

  addMessage('user', msg);
  const aiDiv = addMessage('assistant', '<span class="loading"></span>');

  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg}),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    let text = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});

      for (const line of buf.split('\n')) {
        if (line.startsWith('event: ')) {
          buf = line + '\n';
          continue;
        }
        if (line.startsWith('data: ')) {
          const eventType = buf.match(/event: (\w+)/)?.[1];
          const data = JSON.parse(line.slice(6));
          buf = '';

          if (eventType === 'response') {
            text = data.text;
            aiDiv.querySelector('.text').innerHTML = escapeHtml(text);
          } else if (eventType === 'cost') {
            callCount++;
            totalCost += data.cost;
            totalNaive += data.naive_cost;
            if (data.cache_hit) cacheHits++;
            if (data.cost === 0 && !data.cache_hit) pluginCalls++;
            updateCostPanel(data);
          } else if (eventType === 'error') {
            aiDiv.querySelector('.text').innerHTML = '<span style="color:#e94560">Error: ' + escapeHtml(data.message) + '</span>';
          }
        }
      }
    }
  } catch (e) {
    aiDiv.querySelector('.text').innerHTML = '<span style="color:#e94560">Connection error</span>';
  }

  input.disabled = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = '<div class="role">' + (role === 'user' ? 'You' : 'Sponge') + '</div><div class="text">' + text + '</div>';
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  return div;
}

function updateCostPanel(data) {
  document.getElementById('cost-actual').textContent = '$' + totalCost.toFixed(4);
  document.getElementById('cost-naive').textContent = '$' + totalNaive.toFixed(4);
  const saved = totalNaive - totalCost;
  document.getElementById('cost-saved').textContent = '$' + saved.toFixed(4);
  const pct = totalNaive > 0 ? (saved / totalNaive * 100) : 0;
  document.getElementById('cost-pct').textContent = pct.toFixed(1) + '%';
  document.getElementById('calls-llm').textContent = callCount - cacheHits - pluginCalls;
  document.getElementById('calls-cache').textContent = cacheHits;
  document.getElementById('calls-plugin').textContent = pluginCalls;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
